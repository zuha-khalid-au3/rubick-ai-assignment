services:
  postgres:
    image: postgres:15-alpine
    container_name: rubick_postgres
    environment:
      POSTGRES_USER: rubick
      POSTGRES_PASSWORD: rubick_secret
      POSTGRES_DB: rubick_catalog
    ports:
      - "5433:5432"  # host 5433 avoids conflict with local PostgreSQL on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rubick -d rubick_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rubick_redis
    ports:
      - "6380:6379"  # host 6380 avoids conflict with local Redis on 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rubick_backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://rubick:rubick_secret@postgres:5432/rubick_catalog
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ML_SERVICE_URL: http://ml-service:8000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: rubick_ml
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: postgres://rubick:rubick_secret@postgres:5432/rubick_catalog
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rubick_frontend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
